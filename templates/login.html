<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT90 Tracción — Ingresar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0D1B2A;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a2d44;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo { font-size: 1.4rem; font-weight: 900; color: white; letter-spacing: -.3px; }
    .logo span { color: #1877f2; }
    .subtitle { color: #64748b; font-size: .85rem; margin: 6px 0 32px; }
    label {
      display: block; font-size: .75rem; color: #94a3b8;
      font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 6px;
    }
    input {
      width: 100%; background: #0D1B2A; border: 1px solid #1e3a5f;
      border-radius: 8px; color: #e2e8f0; padding: 11px 14px;
      font-size: .95rem; outline: none; margin-bottom: 18px;
    }
    input:focus { border-color: #1877f2; }
    .btn {
      width: 100%; background: #1877f2; color: white; border: none;
      border-radius: 8px; padding: 13px; font-size: 1rem;
      font-weight: 700; cursor: pointer; margin-top: 4px;
    }
    .btn:hover { background: #1565d8; }
    .error {
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5; padding: 10px 14px; border-radius: 8px;
      font-size: .85rem; margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">MT90 <span>Tracción</span></div>
    <div class="subtitle">Asistente de captación inmobiliaria</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <label>Email</label>
      <input type="email" name="email" placeholder="tu@email.com" required autofocus>
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit" class="btn">Ingresar →</button>
    </form>
  </div>
</body>
</html>
