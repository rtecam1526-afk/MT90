/* Spinner keyframe needed before React mounts */
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<body>
<div id="root"></div>
<div id="debug-msg" style="padding:20px;font-size:16px;color:#333">Cargando CRM...</div>
<script>
  setTimeout(function(){
    var r = document.getElementById('root');
    var d = document.getElementById('debug-msg');
    if(r && r.children.length === 0) {
      d.innerHTML = '<b>Error:</b> React no montó. Abrí F12 → Console y compartí los errores.';
      d.style.color = 'red';
    } else if(d) {
      d.style.display = 'none';
    }
  }, 4000);
</script>

<script>
// Inyectado por Flask: agente activo
window._AGENTE_KEY    = "{{ agente_key }}";
window._AGENTE_NOMBRE = "{{ agente_nombre }}";

// API wrapper para llamadas al backend Flask
window.CRM_API = {
  _fetch: async function(method, path, body) {
    const opts = {
      method: method,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
    };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    if (!r.ok) {
      const txt = await r.text();
      throw new Error(txt || ('HTTP ' + r.status));
    }
    return r.json();
  },
  get:    function(p)    { return window.CRM_API._fetch('GET', p, undefined); },
  post:   function(p, b) { return window.CRM_API._fetch('POST', p, b); },
  put:    function(p, b) { return window.CRM_API._fetch('PUT', p, b); },
  delete: function(p)    { return window.CRM_API._fetch('DELETE', p, undefined); },
};
</script>

<!-- Parche: localStorage mock para cuando Edge Tracking Prevention lo bloquea -->
<script>
try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); }
catch(e) {
  var _ls = {};
  Object.defineProperty(window, 'localStorage', { value: {
    getItem: function(k){ return _ls[k]||null; },
    setItem: function(k,v){ _ls[k]=v; },
    removeItem: function(k){ delete _ls[k]; },
    clear: function(){ _ls={}; },
    key: function(i){ return Object.keys(_ls)[i]||null; },
    get length(){ return Object.keys(_ls).length; }
  }, writable:true });
}
</script>
